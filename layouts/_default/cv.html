{{- define "main" }}
<div class="cv-layout">
  <nav class="cv-sidenav" id="cv-sidenav" aria-label="CV sections">
    <p class="cv-sidenav-label">Sections</p>
  </nav>
  <article class="cv-article">
    <div class="cv-content">
      {{- .Content }}
    </div>
  </article>
</div>
<script>
(function () {
  const content = document.querySelector('.cv-content');
  if (!content) return;

  // 1. Wrap h3 blocks and their following content in job cards
  const children = Array.from(content.children);
  let card = null;
  const fragment = document.createDocumentFragment();

  children.forEach(function (el) {
    const tag = el.tagName;
    if (tag === 'H3') {
      if (card) fragment.appendChild(card);
      card = document.createElement('div');
      card.className = 'cv-job-card';
      card.appendChild(el);
    } else if (tag === 'H2' || tag === 'HR') {
      if (card) { fragment.appendChild(card); card = null; }
      fragment.appendChild(el);
    } else if (card) {
      card.appendChild(el);
    } else {
      fragment.appendChild(el);
    }
  });
  if (card) fragment.appendChild(card);
  content.appendChild(fragment);

  // 2. Build side nav from section h2s (skip first h2 = name)
  const nav = document.getElementById('cv-sidenav');
  const sections = Array.from(content.querySelectorAll('h2')).slice(1);
  sections.forEach(function (h) {
    if (!h.id) {
      h.id = h.textContent.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-');
    }
    const a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent.trim();
    a.className = 'cv-sidenav-link';
    nav.appendChild(a);
  });

  // 3. Highlight active section in side nav
  const observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      const link = nav.querySelector('[href="#' + entry.target.id + '"]');
      if (link) link.classList.toggle('active', entry.isIntersecting);
    });
  }, { rootMargin: '-10% 0px -75% 0px' });

  sections.forEach(function (h) { observer.observe(h); });
})();
</script>
{{- end }}
