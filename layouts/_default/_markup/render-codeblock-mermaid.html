<pre class="mermaid">{{- .Inner | safeHTML }}</pre>
{{- if not (.Page.Store.Get "mermaidScriptEmitted") -}}
{{- .Page.Store.Set "mermaidScriptEmitted" true -}}
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  const prefersDark = localStorage.getItem('pref-theme') === 'dark' ||
    (!localStorage.getItem('pref-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
  mermaid.initialize({ theme: prefersDark ? 'dark' : 'default' });
  mermaid.run({ querySelector: '.mermaid' });
</script>
{{- end -}}
