name: Publish (main)

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.146.7'
          extended: true

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          config: .markdownlint.yaml
          globs: content/**/*.md

      - name: Hugo build check
        run: hugo --quiet

  build-and-push:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: tag
        run: |
          TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
          SHA=${GITHUB_SHA::7}
          echo "tag=main-${TIMESTAMP}-${SHA}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            HUGO_DRAFTS=false
          tags: |
            ghcr.io/geoffdavis/geoffdavis-website:${{ steps.tag.outputs.tag }}
