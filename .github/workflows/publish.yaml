name: Publish (main)

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    # Stays on GitHub-hosted runners deliberately — see build-and-push note.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.146.7'
          extended: true

      - name: Install npm dependencies
        run: npm ci

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v22
        with:
          config: .markdownlint.yaml
          globs: content/**/*.md

      - name: Hugo build check
        run: hugo --quiet

  build-and-push:
    needs: lint
    # NAS fleet self-hosted runners (nas-sdg / nas-sct — whichever is idle).
    # SECURITY: only push-to-main workflows may run self-hosted. This repo is
    # public — PR-triggered workflows must stay on GitHub-hosted runners so
    # fork PRs can never execute on the NAS.
    #
    # The runner container has no docker CLI. Builds go through buildctl to
    # a rootless buildkitd sidecar; BUILDKIT_HOST is preset in the runner
    # environment. amd64 only — the site is served from the x86 NAS fleet.
    runs-on: [self-hosted, x86_64-linux]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate image tag
        id: tag
        run: |
          TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
          SHA=${GITHUB_SHA::7}
          echo "tag=main-${TIMESTAMP}-${SHA}" >> $GITHUB_OUTPUT

      - name: Write job-scoped GHCR credentials for buildctl
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 0700 dir / 0600 file — the credential must not be readable by
          # anything else on the shared runner host.
          umask 077
          mkdir -p "$RUNNER_TEMP/docker"
          AUTH=$(printf '%s:%s' "$GHCR_USER" "$GHCR_TOKEN" | base64 | tr -d '\n')
          printf '{"auths":{"%s":{"auth":"%s"}}}\n' "$REGISTRY" "$AUTH" \
            > "$RUNNER_TEMP/docker/config.json"

      - name: Build and push (buildctl → rootless buildkitd)
        env:
          DOCKER_CONFIG: ${{ runner.temp }}/docker
        run: |
          buildctl build \
            --frontend dockerfile.v0 \
            --local context=. \
            --local dockerfile=. \
            --opt platform=linux/amd64 \
            --opt build-arg:HUGO_DRAFTS=false \
            --output type=image,name=${REGISTRY}/${IMAGE_NAME}:${{ steps.tag.outputs.tag }},push=true

      - name: Remove registry credentials
        if: always()
        run: rm -f "$RUNNER_TEMP/docker/config.json"
