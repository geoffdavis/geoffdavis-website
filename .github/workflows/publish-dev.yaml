name: Publish (dev)

on:
  push:
    branches: [dev]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: tag
        run: |
          TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
          SHA=${GITHUB_SHA::7}
          echo "tag=dev-${TIMESTAMP}-${SHA}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            HUGO_DRAFTS=true
          tags: |
            ghcr.io/geoffdavis/geoffdavis-website:${{ steps.tag.outputs.tag }}
