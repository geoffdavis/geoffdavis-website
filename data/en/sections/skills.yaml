skills:
  - name: BGP / OSPF / MPLS
    summary: "Carrier-grade BGP multi-homing (AS46985), MPLS/EVPN for research and emergency
      services networks spanning 50+ sites."
    categories: ["networking"]

  - name: Cisco / Arista / MikroTik
    summary: "15+ years of hands-on routing and switching across vendors; deep experience
      with Cisco IOS/NX-OS, Arista EOS, and MikroTik RouterOS."
    categories: ["networking"]

  - name: Puppet
    summary: "15 years of infrastructure automation; refactored entire codebase to 95% test
      coverage using AI-assisted tools."
    categories: ["automation"]
    url: "https://puppet.com"

  - name: Ansible
    summary: "Playbook-driven configuration management and ad-hoc infrastructure automation."
    categories: ["automation"]
    url: "https://ansible.com"

  - name: Terraform / OpenTofu
    summary: "Reusable modules and project repos delivered via GitHub Actions IssueOps
      (plan/apply with multi-environment promotion and production gates); modules
      published to a private Artifactory registry. 21+ years of IaC overall
      (Cfengine → Puppet → Terraform/OpenTofu)."
    categories: ["automation", "cloud"]

  - name: JFrog Artifactory
    summary: "Private Terraform module registry with OIDC-authenticated publishing
      from CI pipelines."
    categories: ["automation", "cloud"]

  - name: GitHub Actions / GitOps
    summary: "IssueOps-driven Terraform delivery; reusable/caller workflow architecture,
      OIDC authentication, branch-deploy, and drift detection."
    categories: ["automation"]

  - name: NixOS / Nix flakes
    summary: "Declarative, reproducible multi-host configuration (NixOS, nix-darwin,
      home-manager) as reusable flake modules across macOS and Linux."
    categories: ["automation"]

  - name: Python / Nornir
    summary: "Network automation scripting; Nornir for multi-vendor concurrent device
      configuration management."
    categories: ["automation"]

  - name: Kubernetes (Talos / Rancher)
    summary: "Container orchestration on bare-metal ARM cluster (Talos Linux); also
      experience with Rancher-managed clusters."
    categories: ["cloud"]
    url: "https://kubernetes.io"

  - name: Docker
    summary: "Multi-arch container builds (linux/amd64, linux/arm64); multi-stage
      Dockerfiles for production deployments."
    categories: ["cloud"]
    url: "https://docker.com"

  - name: AWS
    summary: "Broad AWS experience including VPC, EC2, S3, Route53, and IPSec/BGP
      interconnects with on-premises networks."
    categories: ["cloud"]

  - name: Azure
    summary: "Landing-zone delivery — subscription vending, management-group / policy
      placement, secretless GitHub Actions OIDC auth, and Entra ID group &amp; RBAC
      patterns. Plus Virtual WAN hub-and-spoke migration and IPSec/BGP interconnects with
      on-premises EIGRP/MPLS. Commercial Azure, Azure GCC High, AWS commercial, and AWS
      GovCloud, with most day-to-day delivery in Azure Commercial and Azure GCC High."
    categories: ["cloud"]

  - name: Prisma Access / ZTNA
    summary: "Zero-trust network access (ZTNA) appliance deployment and SASE
      integration into cloud infrastructure (Palo Alto Networks)."
    categories: ["cloud", "networking"]

  - name: ZFS
    summary: "Petabyte-scale ZFS storage design; live migration across 50+ nodes with zero
      downtime; DAS → SAN → virtualized ZFS evolution."
    categories: ["storage"]

  - name: Ceph / SAN
    summary: "Distributed storage for Kubernetes workloads and high-availability
      infrastructure."
    categories: ["storage"]

  - name: VMware Site Recovery (VLSR/SRM)
    summary: "Disaster-recovery validation with HPE Primera storage and the HPE Storage
      Replication Adapter (SRA); array-based replication and failover workflows."
    categories: ["storage"]

  - name: NetBox IPAM/DCIM
    summary: "Network source of truth for 1500+ camera infrastructure; automated
      provisioning integration."
    categories: ["observability"]
    url: "https://netbox.dev"

  - name: LibreNMS / Nagios
    summary: "Network monitoring and alerting for carrier-grade wireless research
      network operations."
    categories: ["observability"]

  - name: AI-Augmented DevOps
    summary: "Claude, KiloCode, and Copilot for code refactoring, architecture planning,
      and migrations. Building Model Context Protocol (MCP) servers exposing tools to AI
      agents — including a public OmniFocus extension."
    categories: ["automation"]
