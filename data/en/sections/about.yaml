summary: |
  Infrastructure engineer with 25+ years of experience building and operating
  resilient, large-scale systems for research networks, public utilities, and
  emergency services. Background spanning carrier-grade wireless networks,
  petabyte-scale seismic data infrastructure, statewide wildfire detection systems,
  and shipboard computing. Early adopter of AI-augmented DevOps workflows. Currently
  Senior DevOps Administrator at Oceaneering International, working across Azure cloud
  infrastructure and wide-area networking, alongside concurrent contract work validating
  VMware disaster-recovery and storage systems for Viasat.

