repos:
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        files: ^content/.*\.md$
        args: ["--config", ".markdownlint.yaml"]

  - repo: local
    hooks:
      - id: hugo-build
        name: Hugo build check
        language: system
        entry: hugo --buildDrafts --quiet
        pass_filenames: false
        always_run: true
